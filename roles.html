<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rollen - Online Weerwolven van Whatsapperdam</title>

  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/roles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1>Online Weerwolven van Whatsapperdam</h1>
      <p class="subtitle">Rollen</p>
    </div>
  </header>

  <nav class="main-nav">
    <div class="container nav-links">
      <a href="index.html">Home</a>
      <a href="rules.html">Regels</a>
      <a href="roles.html" class="active">Rollen</a>
      <a href="expansions.html">Uitbreidingen</a>
    </div>
  </nav>

  <main class="container page-content">
    <section class="content-card roles-page-intro">
      <h2>Alle rollen</h2>
      <p>
        Hieronder vind je alle standaardrollen. Klik op een rol om de uitleg te bekijken.
      </p>
    </section>

    <section class="filters-section">
      <h2>Filters</h2>

      <div class="filters-grid">
        <div class="filter-group">
          <label for="alliance-filter">Alliantie</label>
          <select id="alliance-filter">
            <option value="all">Alle allianties</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="type-filter">Type</label>
          <select id="type-filter">
            <option value="all">Alle types</option>
          </select>
        </div>
      </div>
    </section>

    <section>
      <h2 class="roles-overview-title">Overzicht</h2>
      <div id="roles-list" class="roles-grid"></div>
    </section>
  </main>

  <!-- MODAL -->
  <div id="role-modal" class="role-modal hidden" aria-hidden="true">
    <div class="role-modal-backdrop"></div>

    <div class="role-modal-content" role="dialog" aria-modal="true" aria-labelledby="modal-role-name">
      <button id="role-modal-close" class="role-modal-close" aria-label="Sluiten">
        &times;
      </button>

      <div class="role-modal-body">
        <div class="role-modal-image-wrapper">
          <img id="modal-role-image" src="" alt="" class="role-modal-image">
        </div>

        <div class="role-modal-text">
          <h2 id="modal-role-name" class="role-modal-name"></h2>

          <div class="role-modal-meta">
            <div class="meta-block">
              <strong>Alliantie</strong>
              <div id="modal-role-alliance" class="badges"></div>
            </div>

            <div class="meta-block">
              <strong>Type</strong>
              <div id="modal-role-types" class="badges"></div>
            </div>
          </div>

          <div class="role-modal-description">
            <strong>Uitleg</strong>
            <p id="modal-role-description"></p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/roles-data.js"></script>
  <script src="js/roles.js"></script>
</body>
</html>
